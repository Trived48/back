spring.application.name=demo
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:${POSTGRES_USER:sa}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:${POSTGRES_PASSWORD:}}}
spring.jpa.hibernate.ddl-auto=update
server.port=${PORT:2712}
